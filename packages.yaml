# packages.yaml — non-Nix packages, reconciled by `depend`.
#
# Each host's home-manager activation runs `depend install --prune` against this
# file, so every block is the source of truth: anything its providers manage that
# is NOT listed gets removed on the next switch. One block per (platform × purpose);
# the `platform:` key scopes it to a host — chris-laptop is `linux`, chris-macbook
# is `osx`, `all` is both.


# ── Cross-platform ───────────────────────────────────────────────────────────

# VSCode extensions on both hosts.
# No `requires: [code]`: that gate is checked up-front and would abort the whole
# install on a fresh Mac, where depend installs VSCode (the cask) in the same run.
# Instead each extension `dependencies: [visual-studio-code]` so it installs after
# the cask symlinks `code` onto the PATH. On Linux the name is unknown (a no-op) and
# `code` is already present from the Nix vscode.
vscode-extensions:
  platform: all
  vscode:
    ms-python.python:
      dependencies: [visual-studio-code]
    rust-lang.rust-analyzer:
      dependencies: [visual-studio-code]
    anthropic.claude-code:
      dependencies: [visual-studio-code]
    ms-dotnettools.csdevkit:
      dependencies: [visual-studio-code]
    eamodio.gitlens:
      dependencies: [visual-studio-code]
    bbenoist.nix:
      dependencies: [visual-studio-code]
    ms-vscode-remote.remote-ssh:
      dependencies: [visual-studio-code]
    ms-vscode-remote.remote-containers:
      dependencies: [visual-studio-code]
    mkhl.direnv:
      dependencies: [visual-studio-code]


# ── Linux · chris-laptop ─────────────────────────────────────────────────────

# Desktop apps via Flathub.
linux-flatpaks:
  platform: linux
  flatpak:
    # Comments add context the id doesn't (function or the non-obvious "why");
    # household-name apps are left bare.
    app.zen_browser.zen:
      source: flathub
    com.nextcloud.desktopclient.nextcloud:
      source: flathub
    # video editor
    org.shotcut.Shotcut:
      source: flathub
    com.slack.Slack:
      source: flathub
    com.discordapp.Discord:
      source: flathub
    us.zoom.Zoom:
      source: flathub
    # photo manager / organizer
    org.gnome.Shotwell:
      source: flathub
    # screen recording & live-streaming
    com.obsproject.Studio:
      source: flathub
    org.libreoffice.LibreOffice:
      source: flathub
    org.blender.Blender:
      source: flathub
    # lightweight raster image editor (Paint.NET-style)
    com.github.PintaProject.Pinta:
      source: flathub
    org.signal.Signal:
      source: flathub
    org.chromium.Chromium:
      source: flathub
    # PostgreSQL admin & query GUI
    org.pgadmin.pgadmin4:
      source: flathub
    com.spotify.Client:
      source: flathub
    # RDP/VNC client — FreeRDP backend with per-profile SSH tunneling through a jump host
    org.remmina.Remmina:
      source: flathub
    # unofficial Teams Electron wrapper — MS gates the web app on Linux (no bg blur)
    com.github.IsmaelMartinez.teams_for_linux:
      source: flathub
    # N64 emulator — ParaLLEl RDP, gamepad auto-config; successor to simple64
    io.github.gopher64.gopher64:
      source: flathub
    # Plex media client (the Mac gets the `plex` cask)
    tv.plex.PlexDesktop:
      source: flathub

# e4e-data-management via pipx (CLI: `origin`). Linux x86_64 wheel from the v0.6.1
# release; not on PyPI. pipx comes from Nix on the activation PATH.
linux-data-tools:
  platform: linux
  architecture: amd64
  pipx:
    e4e-data-management:
      url: https://github.com/UCSD-E4E/e4e-data-management/releases/download/v0.6.1/e4e_data_management-0.6.1-cp311-abi3-manylinux_2_17_x86_64.manylinux2014_x86_64.whl


# ── macOS · chris-macbook ────────────────────────────────────────────────────

# Homebrew (brew formulae, cask GUI apps) + Mac App Store (mas). brew never runs as
# sudo; a `source:` containing a slash is a tap. Cask/mas tokens are verified before
# adding (against the Homebrew cask / App Store).
mac-apps:
  platform: osx
  brew:
    # iOS / dev toolchain goes here as you re-approve it (cocoapods, fastlane,
    # swiftlint, rbenv, …). Empty → prune leaves brew formulae untouched.
  cask:
    # Zen browser (cask `zen`, not `zen-browser`).
    zen:
    spotify:
    chromium:
    zoom:
    # Nextcloud desktop client (cask `nextcloud`).
    nextcloud:
    slack:
    discord:
    signal:
    # Also provides the `code` CLI on PATH (see vscode-extensions above).
    visual-studio-code:
    pinta:
    # Full Office suite (Word/Excel/PowerPoint/Outlook/OneNote).
    microsoft-office:
    # Plex desktop app.
    plex:
  mas:
    # Mac App Store apps, keyed by numeric id (find via `mas search <name>`).
    # Xcode is App Store only — not a Homebrew cask.
    "497799835":
      name: Xcode

# e4e-data-management via pipx (CLI: `origin`). Same tool as the Linux block, the
# macOS arm64 wheel from the same v0.6.1 release.
mac-data-tools:
  platform: osx
  architecture: arm64
  pipx:
    e4e-data-management:
      url: https://github.com/UCSD-E4E/e4e-data-management/releases/download/v0.6.1/e4e_data_management-0.6.1-cp311-abi3-macosx_11_0_arm64.whl
