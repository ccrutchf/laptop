desktop-apps:
  platform: linux
  flatpak:
    app.zen_browser.zen:
      source: flathub
    com.nextcloud.desktopclient.nextcloud:
      source: flathub
    org.shotcut.Shotcut:
      source: flathub
    com.slack.Slack:
      source: flathub
    com.discordapp.Discord:
      source: flathub
    us.zoom.Zoom:
      source: flathub
    org.gnome.Shotwell:
      source: flathub
    com.obsproject.Studio:
      source: flathub
    org.libreoffice.LibreOffice:
      source: flathub
    org.blender.Blender:
      source: flathub
    com.github.PintaProject.Pinta:
      source: flathub
  # Zen extensions via enterprise policy. Keys are the addon id, `source:` the
  # AMO slug. Depend on the Zen flatpak so the policy lands after it installs.
  zen:
    uBlock0@raymondhill.net:                       # uBlock Origin
      source: ublock-origin
      dependencies: [app.zen_browser.zen]
    "{446900e4-71c2-419f-a6a7-df9c091e268b}":      # Bitwarden
      source: bitwarden-password-manager
      dependencies: [app.zen_browser.zen]

vscode-extensions:
  platform: linux
  requires: [code]
  vscode:
    ms-python.python:
    rust-lang.rust-analyzer:
    anthropic.claude-code:
    ms-dotnettools.csdevkit:
    eamodio.gitlens:

data-tools:
  platform: linux
  architecture: amd64
  pipx:
    # Prebuilt cp311-abi3 wheel from the v0.6.1 GitHub release (CLI: `origin`).
    e4e-data-management:
      url: https://github.com/UCSD-E4E/e4e-data-management/releases/download/v0.6.1/e4e_data_management-0.6.1-cp311-abi3-manylinux_2_17_x86_64.manylinux2014_x86_64.whl
