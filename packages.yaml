desktop-apps:
  platform: linux
  flatpak:
    app.zen_browser.zen:
      source: flathub
    com.nextcloud.desktopclient.nextcloud:
      source: flathub
    org.shotcut.Shotcut:
      source: flathub
    com.slack.Slack:
      source: flathub
    com.discordapp.Discord:
      source: flathub
    us.zoom.Zoom:
      source: flathub
    org.gnome.Shotwell:
      source: flathub
    com.obsproject.Studio:
      source: flathub
    org.libreoffice.LibreOffice:
      source: flathub
    org.blender.Blender:
      source: flathub
    com.github.PintaProject.Pinta:
      source: flathub
    org.signal.Signal:
      source: flathub
    org.chromium.Chromium:
      source: flathub
    org.pgadmin.pgadmin4:
      source: flathub
    com.spotify.Client:
      source: flathub
    com.onepassword.OnePassword:
      source: flathub
    # RDP client (FreeRDP backend) with built-in per-profile SSH-tunnel support —
    # the "SSH Tunnel" tab tunnels the RDP session through a jump host. GNOME
    # Connections was the alternative but has no SSH tunneling.
    org.remmina.Remmina:
      source: flathub
    # Teams in a browser is gated by Microsoft (Firefox/Zen → white screen; Linux
    # browsers can't apply video background effects). This Electron wrapper presents
    # a real Chromium UA, so it loads and gives the best shot at background blur.
    com.github.IsmaelMartinez.teams_for_linux:
      source: flathub
    # N64 emulator (the renamed successor to simple64, same dev). High
    # compatibility (ParaLLEl RDP) with built-in gamepad auto-config, so the
    # Xbox controller works out of the box.
    io.github.gopher64.gopher64:
      source: flathub

vscode-extensions:
  platform: linux
  requires: [code]
  vscode:
    ms-python.python:
    rust-lang.rust-analyzer:
    anthropic.claude-code:
    ms-dotnettools.csdevkit:
    eamodio.gitlens:
    bbenoist.nix:
    ms-vscode-remote.remote-ssh:
    ms-vscode-remote.remote-containers:
    mkhl.direnv:

data-tools:
  platform: linux
  architecture: amd64
  pipx:
    # Prebuilt cp311-abi3 wheel from the v0.6.1 GitHub release (CLI: `origin`).
    e4e-data-management:
      url: https://github.com/UCSD-E4E/e4e-data-management/releases/download/v0.6.1/e4e_data_management-0.6.1-cp311-abi3-manylinux_2_17_x86_64.manylinux2014_x86_64.whl

# macOS (chris-macbook). depend drives Homebrew here — the home-manager activation
# runs `depend install --prune` (home/darwin.nix), so this block IS the source of
# truth: brew/cask/mas packages NOT listed get removed on `darwin-rebuild switch`.
# brew never runs as sudo; a formula/cask `source:` containing a slash is a tap.
#
# Starting minimal on purpose (re-approve apps as you go). NOTE: while a section is
# empty, depend's prune safety-rail leaves that provider untouched — so nothing is
# removed until you actually declare entries here. macfuse is intentionally dropped.
mac-apps:
  platform: osx
  brew:
    # iOS / dev toolchain (uncomment what you want managed):
    # cocoapods:
    # fastlane:
    # swiftlint:
    # rbenv:
    # git-lfs:
  cask:
    # GUI apps via Homebrew cask (tokens verified against the Homebrew cask API).
    zen:                  # Zen browser (cask is `zen`, not `zen-browser`)
    spotify:
    chromium:
    zoom:
    nextcloud:            # Nextcloud desktop client (cask is `nextcloud`)
    slack:
    discord:
  mas:
    # Mac App Store apps, keyed by numeric id (find via `mas search <name>`):
    # "497799835":   # Xcode
    #   name: Xcode
